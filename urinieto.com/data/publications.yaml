#
# Fields:
#   key:          BibTeX citation key (required, must be unique)
#   title:        Paper title (required)
#   authors:      Author list as a string (required)
#   venue:        Conference/journal/publisher name (required)
#   year:         Publication year (required)
#   address:      Location of conference (optional)
#   pages:        Page numbers (optional)
#   volume:       Volume number (optional)
#   number:       Issue number (optional)
#   doi:          DOI string (optional)
#   pdf:          URL to PDF (optional)
#   arxiv:        URL to arXiv page (optional)
#   code:         URL to code repository (optional)
#   slides:       URL to slides (optional)
#   video:        URL to video (optional)
#   demo:         URL to demo page (optional)
#   award:        Award text, e.g. "Best Student Paper" (optional)
#   bibtex_type:  BibTeX entry type: inproceedings, article, phdthesis, mastersthesis, misc, book (optional, default: inproceedings)
#   links:        Additional named links as list of {name, url} (optional)

